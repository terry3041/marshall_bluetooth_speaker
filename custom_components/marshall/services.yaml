# Describes the format for available Marshall integration services

enter_pairing_mode:
  name: Enter pairing mode
  description: Put the speaker into Bluetooth pairing mode to connect new devices.
  fields:
    device_id:
      name: Device
      description: The Marshall speaker device to put into pairing mode.
      required: true
      example: "abc123def456"
      selector:
        device:
          integration: marshall

set_device_name:
  name: Set device name
  description: Change the device name displayed on the speaker.
  fields:
    device_id:
      name: Device
      description: The Marshall speaker device to rename.
      required: true
      example: "abc123def456"
      selector:
        device:
          integration: marshall
    name:
      name: Name
      description: The new name for the device (max 255 bytes).
      required: true
      example: "My Speaker"
      selector:
        text:

set_equaliser_profile:
  name: Set equaliser profile
  description: Set the 5-band equaliser profile (Bass, Low-Mid, Mid, High-Mid, Treble).
  fields:
    device_id:
      name: Device
      description: The Marshall speaker device to adjust.
      required: true
      example: "abc123def456"
      selector:
        device:
          integration: marshall
    bands:
      name: EQ Bands
      description: List of 5 values (0-10, where 5 is neutral) for [Bass, Low-Mid, Mid, High-Mid, Treble]
      required: true
      example: [5, 5, 5, 5, 5]
      selector:
        object:
